<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SariRemit — Remittance Rates & Savings</title>
    <script>
      (function() {
        try {
          var storageKey = 'sariremit-theme-preference';
          var preference = localStorage.getItem(storageKey) || 'system';
          var resolvedTheme = 'dark';
          if (preference === 'light') {
            resolvedTheme = 'light';
          } else if (preference === 'dark') {
            resolvedTheme = 'dark';
          } else {
            var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            resolvedTheme = isDark ? 'dark' : 'light';
          }
          document.documentElement.classList.add(resolvedTheme);
          document.documentElement.classList.remove(resolvedTheme === 'dark' ? 'light' : 'dark');
        } catch (e) {
          console.warn('Theme initialization failed:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
